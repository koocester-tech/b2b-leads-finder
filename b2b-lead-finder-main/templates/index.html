<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Lead Finder</title>
<style>
  :root {
    --bg:#0d0d1a; --surf:#161628; --surf2:#1e1e38; --surf3:#252542;
    --acc:#4f6ef7; --acc2:#8b5cf6; --grn:#10d9a0; --yel:#fbbf24; --red:#f43f5e;
    --txt:#e8eaf0; --mut:#7c829e; --bdr:#2a2a4a; --rad:12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; min-width: 260px; background: var(--surf);
    border-right: 1px solid var(--bdr); display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--bdr);
  }
  .logo {
    font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--acc), var(--acc2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .logo-sub { font-size: .72rem; color: var(--mut); }
  .sidebar-title {
    font-size: .68rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--mut); padding: 14px 18px 8px;
  }
  .history-list { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
  .history-item {
    padding: 10px 10px; border-radius: 8px; cursor: pointer;
    transition: background .15s; margin-bottom: 4px;
  }
  .history-item:hover { background: var(--surf2); }
  .history-item.active { background: var(--surf3); border: 1px solid var(--bdr); }
  .h-query { font-size: .85rem; font-weight: 600; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-meta { font-size: .72rem; color: var(--mut); margin-top: 2px; }
  .h-count { float: right; background: var(--acc); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: .68rem; font-weight: 700; }
  .no-history { font-size: .8rem; color: var(--mut); padding: 12px 10px; }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Search bar ── */
  .search-area {
    padding: 24px 28px 20px;
    background: var(--surf); border-bottom: 1px solid var(--bdr);
  }
  .search-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .country-select {
    background: var(--surf2); border: 1.5px solid var(--bdr); color: var(--txt);
    border-radius: var(--rad); padding: 0 14px; height: 48px; font-size: .9rem;
    outline: none; cursor: pointer; min-width: 150px; transition: border-color .2s;
  }
  .country-select:focus { border-color: var(--acc); }
  .search-input {
    flex: 1; background: var(--surf2); border: 1.5px solid var(--bdr); color: var(--txt);
    border-radius: var(--rad); padding: 0 16px; height: 48px; font-size: .95rem;
    outline: none; min-width: 200px; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--acc); }
  .search-input::placeholder { color: var(--mut); }
  .start-btn {
    background: linear-gradient(135deg, var(--acc), var(--acc2));
    border: none; color: #fff; border-radius: var(--rad); height: 48px;
    padding: 0 28px; font-size: .95rem; font-weight: 700; cursor: pointer;
    transition: opacity .15s; white-space: nowrap;
  }
  .start-btn:hover { opacity: .88; }
  .start-btn:disabled { opacity: .45; cursor: not-allowed; }
  .stop-btn {
    background: transparent; border: 1.5px solid var(--red); color: var(--red);
    border-radius: var(--rad); height: 48px; padding: 0 20px;
    font-size: .9rem; font-weight: 600; cursor: pointer; display: none;
  }

  /* ── Status bar ── */
  .status-bar {
    padding: 10px 28px; background: var(--surf2); border-bottom: 1px solid var(--bdr);
    display: flex; align-items: center; gap: 14px; min-height: 44px;
  }
  .status-text { font-size: .82rem; color: var(--mut); }
  .progress-wrap { flex: 1; max-width: 320px; background: var(--bdr); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--acc), var(--acc2)); border-radius: 4px; width: 0%; transition: width .4s; }
  .lead-count { font-size: .85rem; font-weight: 700; color: var(--grn); }
  .dl-btn {
    margin-left: auto; background: var(--surf); border: 1.5px solid var(--bdr);
    color: var(--txt); border-radius: 8px; padding: 6px 16px; font-size: .82rem;
    font-weight: 600; cursor: pointer; transition: border-color .2s; display: none;
  }
  .dl-btn:hover { border-color: var(--acc); color: var(--acc); }

  /* ── Controls ── */
  .controls {
    padding: 10px 28px; display: flex; gap: 10px; align-items: center;
    border-bottom: 1px solid var(--bdr); flex-wrap: wrap;
  }
  .ctrl-input {
    background: var(--surf2); border: 1px solid var(--bdr); color: var(--txt);
    border-radius: 8px; padding: 6px 12px; font-size: .82rem; outline: none;
  }
  .ctrl-input:focus { border-color: var(--acc); }
  #filter-search { width: 200px; }

  /* ── Table ── */
  .table-wrap { flex: 1; overflow-y: auto; padding: 0 28px 24px; }
  table { width: 100%; border-collapse: collapse; font-size: .84rem; margin-top: 12px; }
  thead th {
    background: var(--surf2); color: var(--mut); font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em; font-size: .68rem;
    padding: 11px 13px; border-bottom: 2px solid var(--bdr);
    white-space: nowrap; position: sticky; top: 0; z-index: 1;
  }
  tbody tr { border-bottom: 1px solid var(--bdr); transition: background .1s; }
  tbody tr:hover { background: var(--surf); }
  tbody tr.new-row { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  td { padding: 10px 13px; vertical-align: middle; }
  .pill { display: inline-block; border-radius: 20px; padding: 2px 9px; font-size: .72rem; font-weight: 600; }
  .pill-g { background: rgba(16,217,160,.15); color: var(--grn); }
  .pill-y { background: rgba(251,191,36,.15); color: var(--yel); }
  .pill-b { background: rgba(79,110,247,.15); color: #a5b4fc; }
  .pill-r { background: rgba(244,63,94,.15); color: var(--red); }
  a { color: var(--acc); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 60px; color: var(--mut); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 4px; }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">🔍 B2B Lead Finder</div>
    <div class="logo-sub">Google Maps · Live Scraper</div>
  </div>
  <div class="sidebar-title">Previous Searches</div>
  <div class="history-list" id="history-list">
    <div class="no-history">No searches yet</div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">

  <!-- Search -->
  <div class="search-area">
    <div class="search-row">
      <select class="country-select" id="country">
        <option value="Singapore">🇸🇬 Singapore</option>
        <option value="Malaysia">🇲🇾 Malaysia</option>
        <option value="Indonesia">🇮🇩 Indonesia</option>
        <option value="Thailand">🇹🇭 Thailand</option>
        <option value="Philippines">🇵🇭 Philippines</option>
        <option value="Australia">🇦🇺 Australia</option>
        <option value="United Kingdom">🇬🇧 United Kingdom</option>
        <option value="United States">🇺🇸 United States</option>
      </select>
      <input class="search-input" id="query" type="text" placeholder="e.g. interior designers, lawyers, dentists …" />
      <button class="start-btn" id="start-btn" onclick="startScrape()">Start →</button>
      <button class="stop-btn" id="stop-btn" onclick="stopScrape()">■ Stop</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-text" id="status-text">Ready. Enter a search to find leads.</span>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <span class="lead-count" id="lead-count"></span>
    <button class="dl-btn" id="dl-btn" onclick="downloadExcel()">⬇ Download Excel</button>
  </div>

  <!-- Filter controls -->
  <div class="controls" id="controls" style="display:none">
    <input class="ctrl-input" id="filter-search" type="text" placeholder="Filter by name, phone, address…" oninput="filterTable()">
    <select class="ctrl-input" id="filter-contact" onchange="filterTable()">
      <option value="all">All leads</option>
      <option value="phone">Has phone</option>
      <option value="website">Has website</option>
      <option value="both">Phone + website</option>
    </select>
    <select class="ctrl-input" id="sort-by" onchange="filterTable()">
      <option value="reviews_desc">Sort: Reviews ↓</option>
      <option value="reviews_asc">Sort: Reviews ↑</option>
      <option value="rating_desc">Sort: Rating ↓</option>
      <option value="name_asc">Sort: Name A–Z</option>
    </select>
    <span id="showing-count" style="font-size:.8rem;color:var(--mut);margin-left:4px"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="empty" id="empty-state">
      <div class="empty-icon">🏢</div>
      <div>Search for any type of business in any country</div>
      <div style="font-size:.8rem;margin-top:6px;color:var(--mut)">Leads will appear here in real time as they're found</div>
    </div>
    <table id="leads-table" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Business Name</th>
          <th>Rating</th>
          <th>Reviews</th>
          <th>Category</th>
          <th>Phone</th>
          <th>Website</th>
          <th>Address</th>
          <th>Maps</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

</main>

<script>
let currentJobId = null;
let currentLeads = [];
let eventSource  = null;

// ── Render one lead row ────────────────────────────────────────────────────
function stars(r) {
  if (!r) return '<span style="color:var(--mut)">—</span>';
  const n = parseFloat(r);
  const cls = n >= 4.5 ? 'pill-g' : n >= 4.0 ? 'pill-y' : 'pill-b';
  return `<span class="pill ${cls}">★ ${r}</span>`;
}
function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }

function rowHTML(lead, i) {
  return `
    <tr class="new-row" data-idx="${i}">
      <td style="color:var(--mut)">${i+1}</td>
      <td style="font-weight:600">${lead.name}</td>
      <td>${stars(lead.rating)}</td>
      <td><span class="pill pill-b">${fmt(lead.reviews)}</span></td>
      <td style="font-size:.78rem;color:var(--mut)">${lead.category||'—'}</td>
      <td>${lead.phone ? `<a href="tel:${lead.phone}">${lead.phone}</a>` : '<span style="color:var(--mut)">—</span>'}</td>
      <td>${lead.website ? `<a href="${lead.website}" target="_blank">🌐 visit</a>` : '<span style="color:var(--mut)">—</span>'}</td>
      <td style="font-size:.78rem;color:var(--mut);max-width:200px">${lead.address||'—'}</td>
      <td>${lead.maps_url ? `<a href="${lead.maps_url}" target="_blank">📍</a>` : ''}</td>
    </tr>`;
}

// ── Start scrape ──────────────────────────────────────────────────────────
async function startScrape() {
  const query   = document.getElementById('query').value.trim();
  const country = document.getElementById('country').value;
  if (!query) { document.getElementById('query').focus(); return; }

  currentLeads = [];
  document.getElementById('table-body').innerHTML = '';
  document.getElementById('leads-table').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('controls').style.display    = 'none';
  document.getElementById('dl-btn').style.display      = 'none';
  document.getElementById('start-btn').disabled        = true;
  document.getElementById('stop-btn').style.display    = 'inline-block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-bar').style.width  = '0%';
  document.getElementById('lead-count').textContent    = '';

  const res = await fetch('/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query, country})
  });
  const {job_id} = await res.json();
  currentJobId = job_id;

  if (eventSource) eventSource.close();
  eventSource = new EventSource(`/stream/${job_id}`);

  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'ping') return;

    if (data.type === 'status') {
      document.getElementById('status-text').textContent = data.message;
      if (data.total) document.getElementById('progress-bar').style.width = '5%';
    }

    if (data.type === 'lead') {
      currentLeads.push(data.lead);
      document.getElementById('leads-table').style.display = 'table';
      document.getElementById('controls').style.display    = 'flex';
      document.getElementById('table-body').insertAdjacentHTML('beforeend', rowHTML(data.lead, currentLeads.length - 1));
      document.getElementById('lead-count').textContent = `${data.count} leads found`;
      if (data.total) {
        const pct = Math.min(95, Math.round((data.count / data.total) * 100));
        document.getElementById('progress-bar').style.width = pct + '%';
      }
      document.getElementById('showing-count').textContent = `${currentLeads.length} leads`;
    }

    if (data.type === 'done') {
      document.getElementById('status-text').textContent = `✅ Done! Found ${data.count} leads.`;
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('start-btn').disabled       = false;
      document.getElementById('stop-btn').style.display   = 'none';
      document.getElementById('dl-btn').style.display     = 'inline-block';
      eventSource.close();
      loadHistory();
    }

    if (data.type === 'error') {
      document.getElementById('status-text').textContent = '❌ Error: ' + data.message;
      document.getElementById('start-btn').disabled = false;
      document.getElementById('stop-btn').style.display = 'none';
      eventSource.close();
    }
  };
}

// ── Stop ──────────────────────────────────────────────────────────────────
function stopScrape() {
  if (eventSource) eventSource.close();
  document.getElementById('start-btn').disabled      = false;
  document.getElementById('stop-btn').style.display  = 'none';
  document.getElementById('status-text').textContent = `Stopped. ${currentLeads.length} leads collected.`;
  if (currentLeads.length > 0) document.getElementById('dl-btn').style.display = 'inline-block';
}

// ── Download Excel ────────────────────────────────────────────────────────
function downloadExcel() {
  if (currentJobId) window.location.href = `/download/${currentJobId}`;
}

// ── Filter / sort table ───────────────────────────────────────────────────
function filterTable() {
  const q  = document.getElementById('filter-search').value.toLowerCase();
  const fc = document.getElementById('filter-contact').value;
  const sb = document.getElementById('sort-by').value;

  let filtered = currentLeads.filter(l => {
    const t = [l.name, l.address, l.phone, l.website, l.category].join(' ').toLowerCase();
    if (q && !t.includes(q)) return false;
    if (fc === 'phone'   && !l.phone)               return false;
    if (fc === 'website' && !l.website)             return false;
    if (fc === 'both'    && (!l.phone || !l.website)) return false;
    return true;
  });

  const [col, dir] = sb.split('_');
  filtered.sort((a, b) => {
    let av = col === 'name' ? a.name.toLowerCase() : (parseFloat(a[col]) || 0);
    let bv = col === 'name' ? b.name.toLowerCase() : (parseFloat(b[col]) || 0);
    return dir === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  document.getElementById('table-body').innerHTML = filtered.map((l, i) => rowHTML(l, i)).join('');
  document.getElementById('showing-count').textContent = `${filtered.length} of ${currentLeads.length} leads`;
}

// ── History ───────────────────────────────────────────────────────────────
async function loadHistory() {
  const res  = await fetch('/history');
  const hist = await res.json();
  const list = document.getElementById('history-list');

  if (!hist.length) {
    list.innerHTML = '<div class="no-history">No searches yet</div>';
    return;
  }

  list.innerHTML = hist.map(h => `
    <div class="history-item" onclick="loadHistoryItem('${h.job_id}')">
      <span class="h-count">${h.count}</span>
      <div class="h-query">${h.query}</div>
      <div class="h-meta">${h.country} · ${h.timestamp}</div>
    </div>
  `).join('');
}

async function loadHistoryItem(jobId) {
  const res  = await fetch(`/history/${jobId}`);
  const data = await res.json();
  if (!data.leads) return;

  currentLeads  = data.leads;
  currentJobId  = jobId;

  document.getElementById('query').value           = data.query;
  document.getElementById('country').value         = data.country;
  document.getElementById('status-text').textContent = `Loaded: "${data.query}" in ${data.country} — ${data.count} leads`;
  document.getElementById('leads-table').style.display = 'table';
  document.getElementById('controls').style.display    = 'flex';
  document.getElementById('dl-btn').style.display      = 'inline-block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('lead-count').textContent     = `${data.count} leads`;

  document.getElementById('table-body').innerHTML = currentLeads.map((l, i) => rowHTML(l, i)).join('');
  document.getElementById('showing-count').textContent = `${currentLeads.length} leads`;

  // highlight active in sidebar
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// ── Enter key on search ───────────────────────────────────────────────────
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScrape();
});

// ── Init ──────────────────────────────────────────────────────────────────
loadHistory();
</script>
</body>
</html>
